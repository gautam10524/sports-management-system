<!DOCTYPE html>
<html lang="en">
<head>
  <title>League Mania</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap/bootstrap.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: linear-gradient(rgba(16, 22, 34, 0.82), rgba(16, 22, 34, 0.82)), url('images/bg_3.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      z-index: -1;
    }
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      color: white;
    }
    .nav-tabs .nav-link {
      color: rgba(255, 255, 255, 0.7);
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      font-weight: 700;
    }
    .nav-tabs .nav-link.active {
      color: #fff;
      border-bottom: 2px solid #ee1e46;
      background: transparent;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 8px;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.2);
      border-color: #ee1e46;
      color: white;
      box-shadow: none;
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    .btn-primary {
      background: #ee1e46;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: bold;
      width: 100%;
      transition: background 0.3s ease;
    }
    .btn-primary:hover {
      background: #dc183f;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="glass-card">
      <div class="text-center mb-4">
        <h2>Welcome to League Mania</h2>
        <p>Login to your account</p>
      </div>

      <div id="alertArea"></div>

      <ul class="nav nav-tabs mb-4 justify-content-center" id="loginTabs" role="tablist">
        <li class="nav-item">
          <a class="nav-link active" id="user-tab" data-toggle="tab" href="#user" role="tab" aria-controls="user" aria-selected="true">User Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="admin-tab" data-toggle="tab" href="#admin" role="tab" aria-controls="admin" aria-selected="false">Admin Login</a>
        </li>
      </ul>

      <div class="tab-content" id="myTabContent">
        <!-- User Login/Register -->
        <div class="tab-pane fade show active" id="user" role="tabpanel" aria-labelledby="user-tab">
          <div id="userLoginForm">
            <h4 class="mb-3">Player Login</h4>
            <div class="form-group">
              <input type="email" id="userEmail" class="form-control" placeholder="Email Address">
            </div>
            <div class="form-group">
              <input type="password" id="userPassword" class="form-control" placeholder="Password">
            </div>
            <button class="btn btn-primary mb-3" onclick="handleLogin(false)">Login</button>
            <div class="text-center">
              <small>Not registered? <a href="#" onclick="toggleRegister(true)" class="text-danger">Create an account</a></small>
            </div>
          </div>

          <div id="userRegisterForm" style="display: none;">
            <h4 class="mb-3">Player Registration</h4>
            <div class="form-group"><input type="text" id="regName" class="form-control" placeholder="Full Name"></div>
            <div class="form-group">
              <label class="small text-white-50 ml-1 mb-1">Date of Birth</label>
              <input type="date" id="regDob" class="form-control" placeholder="Date of Birth">
            </div>
            <div class="form-group">
              <label class="small text-white-50 ml-1 mb-1">Preferred Sport</label>
              <select id="regSport" class="form-control" style="background:#222;color:white;">
                <option value="Football">Football</option>
                <option value="Basketball">Basketball</option>
                <option value="Tennis">Tennis</option>
                <option value="Cricket">Cricket</option>
                <option value="Soccer">Soccer</option>
                <option value="Badminton">Badminton</option>
                <option value="Rugby">Rugby</option>
                <option value="Volleyball">Volleyball</option>
              </select>
            </div>
            <div class="form-group"><input type="email" id="regEmail" class="form-control" placeholder="Email Address"></div>
            <div class="form-group"><input type="password" id="regPassword" class="form-control" placeholder="Password"></div>
            <button class="btn btn-primary mb-3" onclick="handleRegister()">Register</button>
            <div class="text-center">
              <small>Already registered? <a href="#" onclick="toggleRegister(false)" class="text-danger">Login here</a></small>
            </div>
          </div>

          <div id="reapplyArea" style="display: none;" class="text-center mt-3">
             <div class="alert alert-danger" id="rejectionMessage">
                The admin has rejected you.
             </div>
             <button class="btn btn-outline-light btn-sm" onclick="handleReapply()">Try applying again</button>
             <div class="mt-2">
                <a href="#" onclick="resetLogin()" class="text-white-50 small">Back to Login</a>
             </div>
          </div>
        </div>

        <!-- Admin Login -->
        <div class="tab-pane fade" id="admin" role="tabpanel" aria-labelledby="admin-tab">
          <h4 class="mb-3">Admin Login</h4>
          <div class="form-group">
            <input type="email" id="adminEmail" class="form-control" placeholder="Admin Email">
          </div>
          <div class="form-group">
            <input type="password" id="adminPassword" class="form-control" placeholder="Password">
          </div>
          <button class="btn btn-primary" onclick="handleLogin(true)">Login as Admin</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script>
    function toggleRegister(show) {
      document.getElementById('userLoginForm').style.display = show ? 'none' : 'block';
      document.getElementById('userRegisterForm').style.display = show ? 'block' : 'none';
      document.getElementById('reapplyArea').style.display = 'none';
    }

    function resetLogin() {
        document.getElementById('userLoginForm').style.display = 'block';
        document.getElementById('userRegisterForm').style.display = 'none';
        document.getElementById('reapplyArea').style.display = 'none';
    }

    async function handleLogin(isAdmin) {
      const email = isAdmin ? document.getElementById('adminEmail').value : document.getElementById('userEmail').value;
      const pwd = isAdmin ? document.getElementById('adminPassword').value : document.getElementById('userPassword').value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, password: pwd })
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem("user_id", data.id);
          localStorage.setItem("is_admin", data.is_admin);
          localStorage.setItem("user_name", data.name);
          localStorage.setItem("user_sport", data.sport);
          window.location.href = "index.html"; 
        } else if (res.status === 403) {
          localStorage.setItem("pending_user_id", data.id);
          document.getElementById('userLoginForm').style.display = 'none';
          document.getElementById('reapplyArea').style.display = 'block';
          document.getElementById('rejectionMessage').innerText = data.detail;
        } else {
          alert("Login failed: " + (data.detail || "Invalid credentials"));
        }
      } catch (err) {
        alert("Error connecting to server.");
      }
    }

    async function handleReapply() {
      const userId = localStorage.getItem("pending_user_id");
      if (!userId) return alert("User ID not found.");
      
      try {
        const res = await fetch(`/users/${userId}/reapply`, { method: "POST" });
        if (res.ok) {
          alert("Re-application request sent. Please wait for admin approval.");
          resetLogin();
        } else {
          const data = await res.json();
          alert("Failed to reapply: " + data.detail);
        }
      } catch (err) {
        alert("Error connecting to server.");
      }
    }

    async function handleRegister() {
      const dob = document.getElementById('regDob').value;
      if (!dob) return alert("Please specify Date of Birth");

      const payload = {
        name: document.getElementById('regName').value,
        dob: dob,
        sport: document.getElementById('regSport').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
        role: "player"
      };

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          alert("Registration successful. Your request has been sent to the admin for approval.");
          toggleRegister(false);
          document.getElementById('userEmail').value = payload.email;
        } else {
          alert("Registration failed: " + data.detail);
        }
      } catch (err) {
        alert("Error connecting to server.");
      }
    }
  </script>
</body>
</html>
