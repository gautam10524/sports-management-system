<!DOCTYPE html>
<html lang="en">
<head>
  <title>League Mania</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/bootstrap/bootstrap.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body::after {
      content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(rgba(16, 22, 34, 0.82), rgba(16, 22, 34, 0.82)), url('images/main_bg.jpg');
      background-size: cover; background-position: center; background-attachment: fixed; z-index: -1;
    }
    .chat-container { padding-top: 7rem; max-width: 800px; margin: auto; height: 90vh; display: flex; flex-direction: column; }
    .chat-box { flex-grow: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; backdrop-filter: blur(10px); padding: 1.5rem; overflow-y: auto; color: white; margin-bottom: 1rem; }
    .message { margin-bottom: 1rem; padding: 0.8rem 1.2rem; border-radius: 12px; max-width: 80%; }
    .user-msg { background: #ee1e46; align-self: flex-end; margin-left: auto; }
    .ai-msg { background: rgba(255,255,255,0.1); align-self: flex-start; }
    .input-grp { display: flex; gap: 0.5rem; }
    .form-control { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="site-wrap">
    <header class="site-navbar py-4 js-sticky-header" role="banner">
      <div class="container">
        <div class="d-flex align-items-center">
          <div class="site-logo"><a href="user.html"><img src="images/logo.png" alt="Logo"></a></div>
          <div class="ml-auto">
            <nav class="site-navigation position-relative text-right" role="navigation">
              <ul class="site-menu main-menu js-clone-nav mr-auto d-none d-lg-block"></ul>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <div class="container chat-container">
      <div class="text-center mb-4 text-white">
        <h2>AI Sports Assistant</h2>
        <p class="opacity-70">Ask me anything about your sport, training, or matches!</p>
      </div>
      <div id="chatBox" class="chat-box d-flex flex-column">
        <div class="message ai-msg">Hello! I am your AI Sports Assistant. How can I help you today?</div>
      </div>
      <div class="input-grp mb-5">
        <input type="text" id="chatInput" class="form-control" placeholder="Type your message here...">
        <button class="btn btn-danger" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user-msg');
        input.value = '';

        try {
            const res = await fetch(API + "/ai/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            appendMessage(data.reply, 'ai-msg');
        } catch (e) {
            appendMessage("Sorry, I'm having trouble connecting right now.", 'ai-msg');
        }
    }

    function appendMessage(text, className) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'message ' + className;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('chatInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
